# =============================================================
# INTEGRITY POST — Nginx Configuration for SSE
# =============================================================
# Tambahkan blok location berikut ke file Nginx domain Anda:
#   /etc/nginx/sites-available/integritypost.id
#
# JANGAN menghapus atau mengubah blok location yang sudah ada.
# Tambahkan SAJA blok baru ini sebelum kurung tutup server {}.
# =============================================================

server {
    # ... konfigurasi existing Anda ...

    # =============================================================
    # SSE — Server-Sent Events Endpoint
    # =============================================================
    location ~ /sse/news-stream\.php$ {
        # FastCGI settings (sesuaikan dengan PHP-FPM Anda)
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        # fastcgi_pass 127.0.0.1:9000;  # jika pakai TCP

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # SSE-specific settings
        fastcgi_read_timeout 360s;
        fastcgi_buffering off;

        # Disable Nginx buffering untuk SSE
        proxy_buffering off;
        add_header X-Accel-Buffering no;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Connection "keep-alive";

        # Security headers
        add_header X-Content-Type-Options "nosniff";
    }

    # =============================================================
    # SSE — Notify API Endpoint (POST only)
    # =============================================================
    location ~ /sse/notify\.php$ {
        # Hanya izinkan metode POST
        limit_except POST {
            deny all;
        }

        # FastCGI settings
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Standard headers
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/json";
    }

    # =============================================================
    # Static Assets untuk live-news.js
    # =============================================================
    location ~ ^/assets/js/live-news\.js$ {
        # Cache jangka pendek untuk development, panjang untuk production
        expires 1h;
        add_header Cache-Control "public, no-transform";

        # Jika development, uncomment baris berikut untuk disable cache:
        # add_header Cache-Control "no-cache";
    }
}
